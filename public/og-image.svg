<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="200" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1050" cy="480" r="250" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Logo -->
  <text x="600" y="280" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle">PLAYRA</text>
  
  <!-- Tagline -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="36" fill="#a1a1aa" text-anchor="middle">Next-Gen Video Discovery</text>
  
  <!-- Accent line -->
  <rect x="450" y="400" width="300" height="4" fill="url(#accent)" rx="2"/>
  
  <!-- CTA -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="28" fill="#71717a" text-anchor="middle">Discover • Share • Connect</text>
  
  <!-- URL -->
  <text x="600" y="560" font-family="monospace" font-size="20" fill="#52525b" text-anchor="middle">playra.vercel.app</text>
</svg>
